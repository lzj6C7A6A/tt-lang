name: Build tt-lang

on:
    workflow_dispatch:
        inputs:
            build_docs:
                description: "Build and deploy documentation."
                type: boolean
                default: false
    workflow_call:
        inputs:
            build_docs:
                description: "Build and deploy documentation."
                type: boolean
                required: false
                default: false

permissions:
    checks: write
    contents: read

jobs:
    configure-deps:
        uses: ./.github/workflows/call-build-toolchain.yml

    build-tt-lang:
        name: "Build and test tt-lang"
        needs: configure-deps
        runs-on: ubuntu-22.04
        timeout-minutes: 60

        defaults:
            run:
                shell: bash

        steps:
            - name: Checkout tt-lang
              uses: actions/checkout@v5
              with:
                  fetch-depth: 1

            - name: Setup Python 3.12
              uses: actions/setup-python@v5
              with:
                  python-version: "3.12"

            - name: Install system dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y \
                      build-essential \
                      libhwloc-dev libyaml-cpp-dev libboost-all-dev \
                      libtbb-dev libcapstone-dev \
                      cmake ninja-build ccache pkg-config \
                      python3-venv python3-dev \
                      wget zstd

            - name: Install Clang 18
              run: |
                  wget https://apt.llvm.org/llvm.sh
                  chmod u+x llvm.sh
                  sudo ./llvm.sh 18
                  sudo apt-get install -y libc++-18-dev libc++abi-18-dev
                  sudo ln -sf /usr/bin/clang-18 /usr/bin/clang
                  sudo ln -sf /usr/bin/clang++-18 /usr/bin/clang++
                  rm -f llvm.sh

            - name: Fix git safe directory for submodules
              run: git config --global --add safe.directory '*'

            - name: Prepare toolchain directory
              run: sudo install -d -o $(id -u) -g $(id -g) /opt/ttlang-toolchain

            - name: Restore toolchain cache
              uses: actions/cache/restore@v5
              with:
                  path: /opt/ttlang-toolchain
                  key: ${{ needs.configure-deps.outputs.cache-key }}
                  fail-on-cache-miss: true

            - name: Set extra CMake options
              if: inputs.build_docs
              run: echo "CMAKE_EXTRA_CONFIG_OPTIONS=-DTTLANG_ENABLE_DOCS=ON" >> "$GITHUB_ENV"

            - name: Configure tt-lang
              run: |
                  cmake -G Ninja -B build \
                      -DCMAKE_BUILD_TYPE=Release \
                      -DTTLANG_USE_TOOLCHAIN=ON \
                      -DTTLANG_ENABLE_PERF_TRACE=ON \
                      $CMAKE_EXTRA_CONFIG_OPTIONS

            - name: Setup ccache
              uses: hendrikmuhs/ccache-action@v1.2
              with:
                  key: Linux-ttlang-build
                  max-size: 200M

            - name: Build tt-lang
              run: |
                  source build/env/activate
                  cmake --build build

            - name: Smoketest
              run: |
                  source build/env/activate
                  python test/python/smoketest.py

            - name: Run ttlang Lit MLIR tests
              run: |
                  source build/env/activate
                  cmake --build build --target check-ttlang-mlir

            - name: Run ttlang Python bindings tests
              run: |
                  source build/env/activate
                  cmake --build build --target check-ttlang-python-bindings

            - name: Python lit tests
              run: |
                  source build/env/activate
                  cmake --build build --target check-ttlang-python-lit

            - name: Build documentation
              if: inputs.build_docs
              run: |
                  source build/env/activate
                  cmake --build build --target ttlang-docs

            - name: Upload documentation artifact
              if: inputs.build_docs
              uses: actions/upload-pages-artifact@v4
              with:
                  path: ./build/docs/sphinx/_build/html

    test-hardware:
        uses: ./.github/workflows/call-test-hardware.yml
        secrets: inherit
        with:
            runs-on: n150
            timeout: 60
