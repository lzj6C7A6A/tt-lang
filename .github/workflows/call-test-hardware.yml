name: Hardware Tests

on:
  workflow_dispatch:
    inputs:
      runs-on:
        description: 'Hardware type to run on'
        required: false
        type: string
        default: 'n150'
      timeout:
        description: 'Job timeout in minutes'
        required: false
        type: number
        default: 60
      docker_tag:
        description: 'Docker image tag for the ird container.'
        required: false
        type: string
        default: 'v0.1.7'
  workflow_call:
    inputs:
      runs-on:
        description: 'Hardware type to run on'
        required: false
        type: string
        default: 'n150'
      timeout:
        description: 'Job timeout in minutes'
        required: false
        type: number
        default: 60
      docker_tag:
        description: 'Docker image tag for the ird container.'
        required: false
        type: string
        default: 'latest'

permissions:
  checks: write
  contents: read

jobs:
  test-n150:
    name: "Hardware Tests (${{ inputs.runs-on }})"
    runs-on: ${{ format('tt-ubuntu-2204-{0}-stable', inputs.runs-on) }}
    timeout-minutes: ${{ inputs.timeout }}

    container:
      image: ghcr.io/tenstorrent/tt-lang/tt-lang-ird-ubuntu-22-04:${{ inputs.docker_tag }}
      options: --device /dev/tenstorrent
      volumes:
        - /dev/hugepages:/dev/hugepages
        - /dev/hugepages-1G:/dev/hugepages-1G
        - /etc/udev/rules.d:/etc/udev/rules.d
        - /lib/modules:/lib/modules

    defaults:
      run:
        shell: bash

    env:
      RUNS_ON: ${{ inputs.runs-on }}
      PYTHONDONTWRITEBYTECODE: 1
      TTLANG_TEST_SEED: 42

    steps:
      - name: Checkout tt-lang
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Git safe directory
        run: git config --global --add safe.directory "$(pwd)"

      - name: Configure tt-lang
        run: |
          cmake -G Ninja -B build \
              -DCMAKE_BUILD_TYPE=Release \
              -DTTLANG_USE_TOOLCHAIN=ON \
              -DTTLANG_ENABLE_PERF_TRACE=ON

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: Linux-ttlang-hw-${{ inputs.runs-on }}
          max-size: 200M

      - name: Build tt-lang
        run: |
          source build/env/activate
          cmake --build build

      - name: Install test dependencies
        run: |
          source build/env/activate
          pip install -r dev-requirements.txt

      - name: Smoketest
        run: |
          source build/env/activate
          python3 test/python/smoketest.py

      - name: Single test (just python)
        run: |
          source build/env/activate
          python test/python/simple_add.py

      - name: Python lit tests
        run: |
          source build/env/activate
          cmake --build build --target check-ttlang-python-lit

      - name: ME2E tests (MLIR input end-to-end tests)
        run: |
          source build/env/activate
          python3 -m pytest test/me2e -v --tb=short --junitxml=build/test/me2e-report.xml

      - name: Pytests (Python DSL end-to-end tests)
        run: |
          source build/env/activate
          python3 -m pytest test/python -v --tb=long --junitxml=build/test/pytest-report.xml

      - name: Simulator tests
        run: |
          source build/env/activate
          python3 -m pytest test/sim -v -n auto --tb=short --junitxml=build/test/sim-report.xml

      - name: Hardware compiler example scripts
        run: |
          set -eo pipefail
          source build/env/activate
          bash .github/scripts/compile-and-run-examples.sh

      - name: Upload test reports
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: hardware-test-reports-${{ inputs.runs-on }}
          path: |
            build/test/python-lit-report.xml
            build/test/me2e-report.xml
            build/test/pytest-report.xml
            build/test/sim-report.xml
          retention-days: 7
