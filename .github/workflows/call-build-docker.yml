name: Build Docker Image

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      ttlang_sha_override:
        description: "tt-lang SHA/branch override (optional, defaults to current commit)"
        type: string
        required: false
  workflow_call:
    outputs:
      docker-image:
        description: "Built Docker image name with tag"
        value: ${{ jobs.check-if-images-already-exist.outputs.docker-image || jobs.build-image-dist.outputs.docker-image }}
      docker-image-base:
        description: "Base Docker image name with tag"
        value: ${{ jobs.check-if-images-already-exist.outputs.docker-image-base || jobs.build-image-base.outputs.docker-image-base }}

permissions:
  packages: write
  checks: write

jobs:
  check-if-images-already-exist:
    runs-on: ubuntu-latest
    outputs:
      docker-image: ${{ steps.check.outputs.docker-image }}
      docker-image-base: ${{ steps.check.outputs.docker-image-base }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ttlang_sha_override || github.sha }}
          fetch-depth: 0
          fetch-tags: true

      - name: Read tt-mlir commit
        id: ttmlir-commit
        run: |
          COMMIT=$(cat third-party/tt-mlir.commit | tr -d '[:space:]')
          echo "commit=$COMMIT" >> $GITHUB_OUTPUT

      - name: Check if Docker image exists
        id: check
        run: .github/scripts/check-docker-images.sh "${{ steps.ttmlir-commit.outputs.commit }}"

  # Builds the base image on a lightweight runner; dist and ird depend on this
  build-image-base:
    needs: [check-if-images-already-exist]
    if: needs.check-if-images-already-exist.outputs.docker-image == ''
    runs-on: ubuntu-latest
    timeout-minutes: 60

    outputs:
      docker-image-base: ${{ steps.build.outputs.docker-image-base }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ttlang_sha_override || github.sha }}
          fetch-depth: 0
          fetch-tags: true

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: Build base Docker image
        id: build
        env:
          DOCKER_BUILDKIT: 1
          BUILDKIT_STEP_LOG_MAX_SIZE: -1
        run: |
          set -o pipefail
          set -x
          .github/containers/build-docker-images.sh --image-type base | tee docker.log

          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            echo "ERROR: Docker build failed"
            exit 1
          fi

          DOCKER_IMAGE_BASE=$(tail -n 1 docker.log)
          echo "docker-image-base=$DOCKER_IMAGE_BASE" >> $GITHUB_OUTPUT
          echo "✓ Base image built successfully"

  # Runs on a separate large runner after base image is ready
  build-image-dist:
    needs: [check-if-images-already-exist, build-image-base]
    if: needs.check-if-images-already-exist.outputs.docker-image == ''
    runs-on: mlir-large-runner-lang
    timeout-minutes: 360

    outputs:
      docker-image: ${{ steps.build.outputs.docker-image }}

    steps:
      - name: Maximize space
        uses: tenstorrent/tt-github-actions/.github/actions/maximize_space@main

      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ttlang_sha_override || github.sha }}
          fetch-depth: 0
          fetch-tags: true

      - name: Free up some more space
        run: |
          .github/scripts/cleanup-ci-space.sh

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: Clean up Docker before build
        run: |
          echo "Cleaning up Docker system before build..."
          docker system prune -af --volumes || true
          docker builder prune -af || true
          echo "Docker cleanup complete"
          df -h

      - name: Build dist Docker image
        id: build
        env:
          DOCKER_BUILDKIT: 1
          BUILDKIT_STEP_LOG_MAX_SIZE: -1
        run: |
          set -o pipefail
          set -x
          echo "Space usage: " && df -h
          .github/containers/build-docker-images.sh --image-type dist | tee docker.log

          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            echo "ERROR: Docker build failed"
            exit 1
          fi

          DOCKER_IMAGE=$(tail -n 1 docker.log)
          echo "docker-image=$DOCKER_IMAGE" >> $GITHUB_OUTPUT

          echo "Space usage after build: " && df -h
          echo "✓ Dist image built successfully"

      - name: Clean up Docker after build
        if: always()
        run: |
          echo "Cleaning up Docker build cache after build..."
          docker builder prune -af || true
          echo "Docker cleanup complete"
          df -h

      - name: Show disk usage on failure
        if: failure()
        run: |
          echo "=== Disk Usage ==="
          df -h
          echo ""
          echo "=== Disk Usage by Directory ==="
          du -h --max-depth=2 ${{ github.workspace }} 2>/dev/null | sort -hr | head -20 || true
          echo ""
          echo "=== Docker Disk Usage ==="
          docker system df || true

  # Runs on a separate large runner in parallel with build-image-dist
  build-image-ird:
    needs: [check-if-images-already-exist, build-image-base]
    if: needs.check-if-images-already-exist.outputs.docker-image == ''
    runs-on: mlir-large-runner-lang
    timeout-minutes: 360

    steps:
      - name: Maximize space
        uses: tenstorrent/tt-github-actions/.github/actions/maximize_space@main

      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ttlang_sha_override || github.sha }}
          fetch-depth: 0
          fetch-tags: true

      - name: Free up some more space
        run: |
          .github/scripts/cleanup-ci-space.sh

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: Clean up Docker before build
        run: |
          echo "Cleaning up Docker system before build..."
          docker system prune -af --volumes || true
          docker builder prune -af || true
          echo "Docker cleanup complete"
          df -h

      - name: Build ird Docker image
        id: build
        env:
          DOCKER_BUILDKIT: 1
          BUILDKIT_STEP_LOG_MAX_SIZE: -1
        run: |
          set -o pipefail
          set -x
          echo "Space usage: " && df -h
          .github/containers/build-docker-images.sh --image-type ird | tee docker.log

          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            echo "ERROR: Docker build failed"
            exit 1
          fi

          echo "Space usage after build: " && df -h
          echo "✓ IRD image built successfully"

      - name: Clean up Docker after build
        if: always()
        run: |
          echo "Cleaning up Docker build cache after build..."
          docker builder prune -af || true
          echo "Docker cleanup complete"
          df -h

      - name: Show disk usage on failure
        if: failure()
        run: |
          echo "=== Disk Usage ==="
          df -h
          echo ""
          echo "=== Disk Usage by Directory ==="
          du -h --max-depth=2 ${{ github.workspace }} 2>/dev/null | sort -hr | head -20 || true
          echo ""
          echo "=== Docker Disk Usage ==="
          docker system df || true

  set-latest-tag:
    needs: [check-if-images-already-exist, build-image-base, build-image-dist, build-image-ird]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && !failure() && !cancelled()
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: Set latest tag
        run: |
          # Get the image name (from either check or build job)
          DOCKER_IMAGE="${{ needs.check-if-images-already-exist.outputs.docker-image || needs.build-image-dist.outputs.docker-image }}"

          # Extract the tag from the full image name
          TAG="${DOCKER_IMAGE##*:}"

          echo "Setting latest tag for Docker images with tag: $TAG"

          # Tag all image variants as latest
          for IMAGE_SUFFIX in "-base" "-dist" "-ird"; do
            IMAGE_NAME="ghcr.io/tenstorrent/tt-lang/tt-lang${IMAGE_SUFFIX}-ubuntu-22-04"
            echo "Tagging ${IMAGE_NAME}:${TAG} as latest"
            skopeo copy "docker://${IMAGE_NAME}:${TAG}" "docker://${IMAGE_NAME}:latest"
          done

          echo "✓ Latest tags set successfully"
