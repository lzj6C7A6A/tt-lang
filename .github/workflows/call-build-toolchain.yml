name: Configure Toolchain

on:
  workflow_call:
    outputs:
      cache-key:
        description: "Toolchain cache key"
        value: ${{ jobs.configure-deps.outputs.cache-key }}

permissions:
  contents: read

jobs:
  configure-deps:
    name: "Configure dependencies"
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    outputs:
      cache-key: ${{ steps.submodule-shas.outputs.cache-key }}

    defaults:
      run:
        shell: bash

    env:
      CMAKE_BUILD_PARALLEL_LEVEL: 2

    steps:
      - name: Checkout tt-lang (without submodules)
        uses: actions/checkout@v5

      - name: Extract submodule SHAs for cache keys
        id: submodule-shas
        run: |
          LLVM_SHA=$(git ls-tree HEAD third-party/llvm-project | awk '{print substr($3,1,7)}')
          TTMETAL_SHA=$(git ls-tree HEAD third-party/tt-metal | awk '{print substr($3,1,7)}')
          CACHE_KEY="Linux-toolchain_llvm-${LLVM_SHA}_ttmetal-${TTMETAL_SHA}"
          echo "llvm-sha=$LLVM_SHA" >> $GITHUB_OUTPUT
          echo "ttmetal-sha=$TTMETAL_SHA" >> $GITHUB_OUTPUT
          echo "cache-key=$CACHE_KEY" >> $GITHUB_OUTPUT
          echo "LLVM submodule SHA: $LLVM_SHA"
          echo "tt-metal submodule SHA: $TTMETAL_SHA"
          echo "Cache key: $CACHE_KEY"

      - name: Restore toolchain cache
        id: cache-toolchain
        uses: actions/cache/restore@v5
        with:
          path: /opt/ttlang-toolchain
          key: ${{ steps.submodule-shas.outputs.cache-key }}

      # Everything below only runs on cache miss
      - name: Checkout submodules
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: git submodule update --init --recursive --depth 1

      - name: Install system dependencies
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
              build-essential \
              libhwloc-dev libyaml-cpp-dev libboost-all-dev \
              libtbb-dev libcapstone-dev \
              cmake ninja-build ccache pkg-config \
              python3-venv python3-dev \
              wget zstd

      - name: Setup Python 3.12
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install Clang 18
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod u+x llvm.sh
          sudo ./llvm.sh 18
          sudo apt-get install -y libc++-18-dev libc++abi-18-dev
          sudo ln -sf /usr/bin/clang-18 /usr/bin/clang
          sudo ln -sf /usr/bin/clang++-18 /usr/bin/clang++
          rm -f llvm.sh

      - name: Fix git safe directory for submodules
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: git config --global --add safe.directory '*'

      - name: Prepare toolchain directory
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: sudo install -d -o $(id -u) -g $(id -g) /opt/ttlang-toolchain

      - name: Configure (builds LLVM + tt-metal)
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          cmake -G Ninja -B build \
              -DCMAKE_BUILD_TYPE=Release \
              -DTTLANG_TOOLCHAIN_DIR=/opt/ttlang-toolchain \
              -DTTLANG_ENABLE_PERF_TRACE=ON

      - name: Install tt-metal into toolchain
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          bash scripts/install-ttmetal.sh \
              third-party/tt-metal \
              build/tt-metal \
              /opt/ttlang-toolchain/tt-metal

      - name: Remove venv from toolchain (not portable across machines)
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: rm -rf /opt/ttlang-toolchain/venv

      - name: Save toolchain cache
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: /opt/ttlang-toolchain
          key: ${{ steps.submodule-shas.outputs.cache-key }}
